<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Marketplace Aggregator</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #222; }
    h1 { font-size: 1.4rem; }
    h2 { font-size: 1.1rem; margin-top: 2rem; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
    form { display: flex; flex-direction: column; gap: 8px; max-width: 420px; }
    input, textarea { padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }
    button { padding: 8px 16px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; width: fit-content; }
    button:hover { background: #0052a3; }
    button.secondary { background: #444; font-size: 0.8rem; padding: 5px 10px; }
    button.secondary:hover { background: #222; }
    button.link { color: #0066cc; background: transparent; padding: 0; font-size: 0.85rem; }
    button.link:hover { text-decoration: underline; background: transparent; }
    .listing { border: 1px solid #ddd; border-radius: 6px; padding: 12px; margin-top: 10px; cursor: pointer; }
    .listing:hover { border-color: #999; background: #fafafa; }
    .listing.selected { border-color: #0066cc; background: #f5f9ff; }
    .listing h3, .detail h3 { margin: 0 0 4px; font-size: 1rem; }
    .listing-id { color: #777; font-size: 0.75rem; word-break: break-all; }
    .price { color: #333; font-weight: bold; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; margin: 4px 4px 0 0; }
    .PENDING   { background: #fff3cd; color: #856404; }
    .PUBLISHED { background: #d1e7dd; color: #0a3622; }
    .FAILED    { background: #f8d7da; color: #842029; }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(320px, 420px); gap: 24px; align-items: start; }
    .detail { border: 1px solid #ddd; border-radius: 6px; padding: 14px; margin-top: 10px; }
    .detail-empty { color: #777; font-size: 0.9rem; padding: 14px 0; }
    .description { margin: 10px 0; white-space: pre-wrap; font-size: 0.9rem; color: #444; }
    .status-row { padding: 8px 0; border-top: 1px solid #eee; font-size: 0.85rem; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .activity { font-size: 0.85rem; color: #555; margin-top: 12px; }
    .activity ul { margin: 6px 0 0 18px; padding: 0; }
    .activity li { margin: 4px 0; }
    #message { color: green; margin-top: 8px; font-size: 0.9rem; }
    #error { color: red; margin-top: 8px; font-size: 0.9rem; }
    @media (max-width: 760px) {
      body { margin-top: 24px; }
      .layout { grid-template-columns: 1fr; gap: 12px; }
    }
  </style>
</head>
<body>

<h1>Marketplace Aggregator</h1>

<h2>Create Listing</h2>
<form id="createForm">
  <input type="text" id="title" placeholder="Title" required>
  <textarea id="description" placeholder="Description" rows="3"></textarea>
  <input type="number" id="price" placeholder="Price" required min="0">
  <label>
    <input type="checkbox" id="ebay" value="ebay" checked> eBay
  </label>
  <button type="submit">Create</button>
</form>
<div id="message"></div>
<div id="error"></div>

<div class="layout">
  <section>
    <h2>Listings <button class="link" onclick="loadListings()">Refresh</button></h2>
    <div id="listings"></div>
  </section>

  <section>
    <h2>Listing Detail</h2>
    <div id="detail" class="detail-empty">Select a listing to view marketplace status, activity, and test events.</div>
  </section>
</div>

<script>
  const API_URL = 'https://7uhda0ji1b.execute-api.us-west-2.amazonaws.com/prod';
  const MOCK_API_URL = 'https://niumrztk8b.execute-api.us-west-2.amazonaws.com/prod';

  let selectedListingId = null;

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, c => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    }[c]));
  }

  function formatDate(value) {
    return value ? new Date(value).toLocaleString() : '';
  }

  async function createListing(e) {
    e.preventDefault();
    setMessage('');
    setError('');

    const marketplaceIds = [];
    if (document.getElementById('ebay').checked) marketplaceIds.push('ebay');

    const body = {
      title: document.getElementById('title').value,
      description: document.getElementById('description').value,
      price: Number(document.getElementById('price').value),
      marketplaceIds
    };

    try {
      const res = await fetch(`${API_URL}/listings`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || res.status);

      document.getElementById('createForm').reset();
      document.getElementById('ebay').checked = true;
      setMessage(`Created: ${data.listingId}`);
      await loadListings(data.listingId);
      await showDetail(data.listingId);
    } catch (err) {
      setError(`Error: ${err.message}`);
    }
  }

  async function loadListings(selectListingId = selectedListingId) {
    try {
      const res = await fetch(`${API_URL}/listings`);
      const listings = await res.json();
      const container = document.getElementById('listings');

      if (!listings || !listings.length) {
        container.innerHTML = '<p style="color:#888">No listings yet.</p>';
        return;
      }

      selectedListingId = selectListingId;
      container.innerHTML = listings.map(l => `
        <div class="listing ${l.listingId === selectedListingId ? 'selected' : ''}" data-listing-id="${escapeHtml(l.listingId)}" onclick="showDetail('${l.listingId}')">
          <h3>${escapeHtml(l.title)}</h3>
          <div class="listing-id">${escapeHtml(l.listingId)}</div>
          <div class="price">$${Number(l.price).toLocaleString()}</div>
          <div>
            ${(l.marketplaceStatuses || []).map(s =>
              `<span class="badge ${escapeHtml(s.status)}">${escapeHtml(s.marketplaceId)}: ${escapeHtml(s.status)}</span>`
            ).join('')}
          </div>
        </div>
      `).join('');
    } catch (err) {
      document.getElementById('listings').innerHTML = `<p style="color:red">Failed to load: ${escapeHtml(err.message)}</p>`;
    }
  }

  async function showDetail(listingId) {
    selectedListingId = listingId;
    setMessage('');
    setError('');

    const detail = document.getElementById('detail');
    detail.className = 'detail';
    detail.innerHTML = 'Loading...';
    highlightSelectedListing();

    try {
      const res = await fetch(`${API_URL}/listings/${listingId}`);
      const listing = await res.json();
      if (!res.ok) throw new Error(listing.message || res.status);

      detail.innerHTML = renderDetail(listing);
    } catch (err) {
      detail.innerHTML = `<p style="color:red">Failed to load detail: ${escapeHtml(err.message)}</p>`;
    }
  }

  function renderDetail(l) {
    return `
      <h3>${escapeHtml(l.title)}</h3>
      <div class="listing-id">${escapeHtml(l.listingId)}</div>
      <div class="price">$${Number(l.price).toLocaleString()}</div>
      <div class="description">${escapeHtml(l.description || '')}</div>

      <strong>Marketplace status</strong>
      ${(l.marketplaceStatuses || []).map(s => `
        <div class="status-row">
          <span class="badge ${escapeHtml(s.status)}">${escapeHtml(s.marketplaceId)}: ${escapeHtml(s.status)}</span>
          ${s.externalListingId ? `<div>External ID: ${escapeHtml(s.externalListingId)}</div>` : ''}
          ${s.publishedAt ? `<div>Published: ${formatDate(s.publishedAt)}</div>` : ''}
          ${s.failReason ? `<div>Failure: ${escapeHtml(s.failReason)}</div>` : ''}
        </div>
      `).join('') || '<p style="color:#777">No marketplace status yet.</p>'}

      <div class="actions">
        <button class="secondary" onclick="triggerMarketplaceEvent('${l.listingId}', 'item_sold')">Trigger item_sold</button>
        <button class="secondary" onclick="triggerMarketplaceEvent('${l.listingId}', 'new_comment')">Trigger new_comment</button>
      </div>

      <div class="activity">
        <strong>Recent activity</strong>
        ${(l.activities || []).length ? `
          <ul>
            ${l.activities.map(a => `
              <li>${formatDate(a.timestamp)} - ${escapeHtml(a.marketplaceId)} ${escapeHtml(a.eventType)}</li>
            `).join('')}
          </ul>
        ` : '<p style="color:#777">No activity yet.</p>'}
      </div>
    `;
  }

  async function triggerMarketplaceEvent(listingId, eventType) {
    setMessage('');
    setError('');

    try {
      const res = await fetch(`${MOCK_API_URL}/mock/listings/${listingId}/events`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ eventType })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || data.error || res.status);

      setMessage(`Sent ${eventType} for ${listingId}`);
      setTimeout(() => showDetail(listingId), 1000);
      setTimeout(() => loadListings(listingId), 1000);
    } catch (err) {
      setError(`Error: ${err.message}`);
    }
  }

  function highlightSelectedListing() {
    document.querySelectorAll('.listing').forEach(node => {
      node.classList.toggle('selected', node.dataset.listingId === selectedListingId);
    });
  }

  function setMessage(message) {
    document.getElementById('message').textContent = message;
  }

  function setError(message) {
    document.getElementById('error').textContent = message;
  }

  document.getElementById('createForm').addEventListener('submit', createListing);
  loadListings();
</script>
</body>
</html>
